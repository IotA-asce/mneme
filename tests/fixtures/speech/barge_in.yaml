name: barge_in
description: New user speech while speech is active preempts the active speech goal.
virtual_speech_duration_ms: 5000
speech_inputs:
  - speaker: user
    transcript: hello Mneme
    confidence: 0.9
  - speaker: user
    transcript: wait one more thing
    confidence: 0.9
steps:
  - advance_ms: 1000
    expect:
      speech_status: transcribed
      utterance_count: 1
      responses_generated_total: 1
  - advance_ms: 1000
    expect:
      speech_status: transcribed
      utterance_count: 1
      responses_generated_total: 2
      barge_ins_total: 1
      tts_preempted_total: 1


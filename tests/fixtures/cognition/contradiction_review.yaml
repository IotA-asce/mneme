name: contradiction_review
description: Confirmed-vs-confirmed incompatible facts are preserved for review.
category: contradiction_handling
steps:
  - input: "remember that I like green tea"
    timestamp: 1000
    expect:
      turn_type: explicit_remember_instruction
  - input: "what do I like?"
    timestamp: 2000
    expect:
      turn_type: recall_question
      memory_ref_required: true
      response_contains:
        - green tea
  - input: "confirm this"
    timestamp: 3000
    expect:
      turn_type: confirm_memory_request
      review_proposal_required: true
      review_type: confirm_memory
      apply_latest_review: true
      review_status: applied
      fact_source_type: user_confirmed
      category_tags:
        - review_proposal
  - input: "actually I like coffee"
    timestamp: 4000
    expect:
      turn_type: correction
      review_proposal_required: true
      review_type: correction
      apply_latest_review: true
      review_status: applied
      conflict_report_required: true
      fact_status_counts:
        conflicted: 2
      category_tags:
        - contradiction_handling
        - correction_acceptance
